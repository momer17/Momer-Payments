$kind: http-request
name: Update Account
method: PATCH
url: '{{baseUrl}}/api/v1/account/{{accountUUID}}/name'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "accountName": "Updated Name",
      "ownerAccountID": "{{accountUUID}}"
    }
